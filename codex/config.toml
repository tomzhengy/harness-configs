model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"
service_tier = "default"

[mcp_servers.github]
command = "bunx"
args = ["@modelcontextprotocol/server-github"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

[mcp_servers.nia]
command = "uvx"
args = ["--no-cache", "nia-mcp-server"]
env = { NIA_API_URL = "https://apigcp.trynia.ai/" }
env_vars = ["NIA_API_KEY"]

[features]
multi_agent = true
goals = true
hooks = true
fast_mode = true

# preempt the full access warning prompt since we always run with full access
[notice]
hide_full_access_warning = true

[projects."/Users/minitom/workspaces/harness-configs"]
trust_level = "trusted"

